name: recipe_pilot
description: "AI-powered ingredient-based recipe app by 1865 Free Money LLC"
publish_to: 'none'
version: 1.0.2+76

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Models / Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Supabase
  supabase_flutter: ^2.8.4

  # Speech
  speech_to_text: ^7.0.0

  # Payments
  purchases_flutter: ^8.6.0

  # Networking
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.5

  # UI Helpers
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Camera / Image
  image_picker: ^1.1.2

  # Auth
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  logger: ^2.5.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

  # Testing
  mocktail: ^1.0.4

  # App Icon
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  image_path_ios: "assets/icon/app_icon_ios.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#0a0f1e"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
  #   - assets/icons/
